<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0a1f2c" />
<title>Seminar Check-In — U.S. Capital Wealth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&display=swap');
:root{
  --uscw-navy:#002a47; --uscw-blue-medium:#004975; --uscw-teal:#0f465a; --uscw-gold:#d2aa7e;
  --uscw-gold-light:#f0e8d8; --uscw-light-blue-green:#cad5d4; --uscw-link-blue:#0076be;
  --uscw-gray-900:#282828; --uscw-gray-700:#505050; --uscw-gray-500:#878787; --uscw-gray-300:#c1c2c0;
  --uscw-gray-200:#dedfdd; --uscw-gray-100:#efefee; --hairline:#e6e1d6;
  --font-display:'Cormorant Garamond','EB Garamond',Georgia,'Times New Roman',serif;
  --font-sans:'Nunito Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --touch-min:58px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;min-height:100%;}
body{background:#0a1f2c;background-image:linear-gradient(180deg,#004975 0%,#0a1f2c 62%);background-attachment:fixed;color:var(--uscw-gray-900);font-family:var(--font-sans);font-size:20px;line-height:1.5;padding-top:64px;user-select:none;}
input,textarea,select{user-select:text;}
#brand-header{position:fixed;top:0;left:0;right:0;height:64px;z-index:500;display:flex;align-items:center;gap:12px;padding:0 28px;background:rgba(0,26,45,0.55);border-bottom:1px solid rgba(210,170,126,0.28);}
#brand-header img{height:30px;display:block;}
#app{min-height:calc(100vh - 64px);display:flex;flex-direction:column;}
.screen{display:flex;flex:1;flex-direction:column;align-items:center;padding:44px 24px;overflow-y:auto;min-height:calc(100vh - 64px);}
.screen.hidden{display:none;}
.screen-inner{width:100%;max-width:680px;margin:auto;text-align:center;background:#fff;border:1px solid var(--hairline);border-radius:0;padding:56px 48px;box-shadow:0 16px 48px rgba(0,24,41,0.28);}
h1,h2{font-family:var(--font-display);font-weight:300;color:var(--uscw-navy);letter-spacing:0.005em;margin:0 0 12px;text-wrap:balance;}
h1{font-size:46px;line-height:1.08;}
h2{font-size:34px;font-weight:400;}
.eyebrow{font-family:var(--font-sans);font-size:13px;font-weight:600;letter-spacing:0.32em;text-transform:uppercase;color:var(--uscw-teal);display:block;margin-bottom:14px;}
p.instructions,p.body-text{color:var(--uscw-gray-700);font-size:19px;line-height:1.55;margin:0 auto 28px;max-width:52ch;}
.marquee-wrap{display:flex;justify-content:center;margin:0 auto 26px;}
.marquee{display:inline-flex;align-items:center;justify-content:center;gap:10px;color:var(--uscw-gold);line-height:1;}
.marquee::before,.marquee::after{content:"";display:block;width:56px;height:1px;background:currentColor;}
.marquee__mark{display:inline-flex;align-items:center;gap:6px;font-size:8px;}
.marquee__mark::before,.marquee__mark::after{content:"\00b7";font-size:14px;line-height:0;}
.marquee__star{width:8px;height:8px;display:inline-block;background:currentColor;-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6 Z'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6 Z'/></svg>") center/contain no-repeat;}
input[type=text],input[type=password],input[type=email],input[type=tel],input[type=date],textarea{width:100%;padding:16px 18px;font-size:19px;font-family:var(--font-sans);border:1px solid var(--uscw-gray-300);border-radius:0;margin-bottom:16px;background:#fff;color:var(--uscw-gray-900);}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--uscw-navy);box-shadow:inset 0 0 0 1px var(--uscw-navy);}
label{display:block;text-align:left;font-weight:600;font-size:14px;letter-spacing:0.02em;margin-bottom:6px;color:var(--uscw-gray-700);}
.field{text-align:left;margin-bottom:12px;}
.btn{display:block;width:100%;min-height:var(--touch-min);padding:18px 24px;margin:12px 0;font-family:var(--font-sans);font-size:14px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;border:1px solid var(--uscw-navy);border-radius:0;background:var(--uscw-navy);color:#fff;cursor:pointer;transition:background 160ms ease,border-color 160ms ease;}
.btn:hover{background:var(--uscw-blue-medium);border-color:var(--uscw-blue-medium);}
.btn:active{background:#001a2d;}
.btn-accent{background:var(--uscw-gold);border-color:var(--uscw-gold);color:var(--uscw-navy);}
.btn-accent:hover{background:#c69c6e;border-color:#c69c6e;}
.btn-accent:active{background:#b98f5f;}
.btn-secondary{background:transparent;border:1px solid var(--uscw-gray-300);color:var(--uscw-navy);text-transform:none;letter-spacing:0.01em;font-size:16px;}
.btn-secondary:hover{background:var(--uscw-gray-100);border-color:var(--uscw-gray-300);}
.btn-secondary:active{background:var(--uscw-gray-200);}
.btn-danger{background:#b3261e;border-color:#b3261e;color:#fff;}
.btn-danger:hover{background:#8f1e18;border-color:#8f1e18;}
.btn-small{width:auto;min-height:46px;padding:11px 18px;font-size:12px;letter-spacing:0.14em;margin:4px;display:inline-block;}
.btn-delete-selected{min-height:23px;padding:5px 9px;font-size:11px;letter-spacing:0.08em;}
.btn-row{display:flex;gap:12px;}.btn-row .btn{flex:1;}
.hint{color:var(--uscw-gray-700);min-height:28px;margin-bottom:8px;font-size:16px;}
.results-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.result-row{text-align:left;padding:18px 22px;border-radius:0;background:#fff;border:1px solid var(--hairline);border-left:3px solid var(--uscw-gold);font-size:19px;font-weight:600;color:var(--uscw-navy);cursor:pointer;transition:background 140ms ease;}
.result-row:hover{background:var(--uscw-gold-light);}
.result-row:active{background:var(--uscw-light-blue-green);}
.card-grid{display:flex;flex-direction:column;gap:14px;margin:16px 0;}
.option-card{padding:24px;border-radius:0;background:#fff;border:1px solid var(--hairline);font-family:var(--font-display);font-size:28px;font-weight:400;color:var(--uscw-navy);cursor:pointer;min-height:var(--touch-min);display:flex;align-items:center;justify-content:center;transition:background 140ms ease;}
.option-card:hover{background:var(--uscw-gold-light);}
.option-card:active{background:var(--uscw-light-blue-green);}
.error-text{color:#b3261e;font-weight:600;min-height:24px;margin:8px 0;}
.admin-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;justify-content:center;}
.admin-tab-btn{padding:12px 18px;border-radius:0;border:1px solid var(--uscw-gray-300);background:#fff;font-family:var(--font-sans);font-weight:600;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--uscw-navy);cursor:pointer;}
.admin-tab-btn.active{background:var(--uscw-navy);color:#fff;border-color:var(--uscw-navy);}
.admin-panel{display:none;width:100%;text-align:left;}
.admin-panel.active{display:block;}
.admin-panel h2{font-size:26px;margin-top:20px;}
table{width:100%;border-collapse:collapse;margin-bottom:16px;background:#fff;font-size:15px;}
th,td{border:1px solid var(--hairline);padding:9px 11px;font-size:15px;text-align:left;}
th{background:var(--uscw-gray-100);font-family:var(--font-sans);font-weight:700;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:var(--uscw-gray-700);}
select{padding:8px;font-size:15px;border-radius:0;border:1px solid var(--uscw-gray-300);background:#fff;}
textarea{min-height:150px;}
.summary-box{background:var(--uscw-gold-light);border:1px solid var(--hairline);border-radius:0;padding:16px;margin:12px 0;text-align:left;font-size:16px;}
.checkbox-row{display:flex;align-items:center;gap:10px;margin:6px 0;text-align:left;}
.checkbox-row input{width:22px;height:22px;}
#staff-access-btn{position:fixed;bottom:18px;right:18px;z-index:999;padding:10px 18px;border:1px solid rgba(210,170,126,0.5);border-radius:0;background:rgba(0,26,45,0.4);color:var(--uscw-gold);font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;}
#staff-access-btn:hover{background:rgba(0,26,45,0.65);}
#print-summary{display:none;}
@media print{body>*:not(#print-summary){display:none!important;}#print-summary{display:block!important;}#print-summary table{width:100%;border-collapse:collapse;}#print-summary th,#print-summary td{border:1px solid #333;padding:6px;font-size:12px;}}
</style>
</head>

const IdUtil = {
  newId(prefix) {
    return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  }
};

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(k => {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'text') e.textContent = attrs[k];
      else if (k.indexOf('on') === 0 && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    });
  }
  (children || []).forEach(c => {
    if (c === null || c === undefined) return;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function debounce(fn, ms) {
  let handle = null;
  return function () {
    const args = arguments;
    if (handle) clearTimeout(handle);
    handle = setTimeout(() => fn.apply(null, args), ms);
  };
}

async function sha256Hex(str) {
  const enc = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function csvEscape(value) {
  const s = value === null || value === undefined ? '' : String(value);
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function toCSV(rows, columns) {
  const header = columns.map(c => csvEscape(c.label)).join(',');
  const lines = rows.map(row => columns.map(c => csvEscape(row[c.key])).join(','));
  return [header].concat(lines).join('\r\n');
}

function downloadBlob(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

/* =========================================================
   SECTION: HOLIDAYS / BUSINESS DAYS
   Holidays are stored as *rules* (fixed date or nth-weekday),
   not fixed dates, so the list is valid across years without
   annual maintenance. Staff can add one-off dates or exclude
   a default via the admin Holidays tab.
   ========================================================= */
const HOLIDAYS_DEFAULT = [
  { name: "New Year's Day",   type: 'fixed',   month: 1,  day: 1 },
  { name: "MLK Day",          type: 'nth-dow', month: 1,  weekday: 1, n: 3 },
  { name: "Presidents Day",   type: 'nth-dow', month: 2,  weekday: 1, n: 3 },
  { name: "Memorial Day",     type: 'last-dow',month: 5,  weekday: 1 },
  { name: "Juneteenth",       type: 'fixed',   month: 6,  day: 19 },
  { name: "Independence Day", type: 'fixed',   month: 7,  day: 4 },
  { name: "Labor Day",        type: 'nth-dow', month: 9,  weekday: 1, n: 1 },
  { name: "Columbus Day",     type: 'nth-dow', month: 10, weekday: 1, n: 2 },
  { name: "Veterans Day",     type: 'fixed',   month: 11, day: 11 },
  { name: "Thanksgiving",     type: 'nth-dow', month: 11, weekday: 4, n: 4 },
  { name: "Christmas Day",    type: 'fixed',   month: 12, day: 25 }
];

function pad2(n) { return String(n).padStart(2, '0'); }
function isoFromParts(year, month, day) { return year + '-' + pad2(month) + '-' + pad2(day); }

function nthWeekdayOfMonth(year, month, weekday, n) {
  const first = new Date(year, month - 1, 1);
  const firstDow = first.getDay();
  const day = 1 + ((7 + weekday - firstDow) % 7) + (n - 1) * 7;
  return isoFromParts(year, month, day);
}

function lastWeekdayOfMonth(year, month, weekday) {
  const lastDayNum = new Date(year, month, 0).getDate();
  const last = new Date(year, month - 1, lastDayNum);
  const lastDow = last.getDay();
  const day = lastDayNum - ((7 + lastDow - weekday) % 7);
  return isoFromParts(year, month, day);
}

const BusinessDays = {
  resolveRuleForYear(year, rule) {
    if (rule.type === 'fixed') return isoFromParts(year, rule.month, rule.day);
    if (rule.type === 'nth-dow') return nthWeekdayOfMonth(year, rule.month, rule.weekday, rule.n);
    if (rule.type === 'last-dow') return lastWeekdayOfMonth(year, rule.month, rule.weekday);
    return null;
  },
  resolveNamedDatesForYears(rules, years) {
    const out = [];
    years.forEach(year => rules.forEach(rule => {
      const date = this.resolveRuleForYear(year, rule);
      if (date) out.push({ name: rule.name, date });
    }));
    return out;
  },
  buildHolidaySet(rules, years, addedCustom, removedDefaults) {
    const set = new Set();
    this.resolveNamedDatesForYears(rules, years).forEach(d => set.add(d.date));
    (addedCustom || []).forEach(d => set.add(d));
    (removedDefaults || []).forEach(d => set.delete(d));
    return set;
  },
  // Local getters used deliberately -- toISOString() converts to UTC and
  // can shift the date near midnight depending on the iPad's timezone.
  formatISODate(date) { return isoFromParts(date.getFullYear(), date.getMonth() + 1, date.getDate()); },
  formatFriendlyDate(date) {
    return new Intl.DateTimeFormat('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).format(date);
  },
  isWeekend(date) { const d = date.getDay(); return d === 0 || d === 6; },
  isHoliday(date, holidaySet) { return holidaySet.has(this.formatISODate(date)); },
  isBusinessDay(date, holidaySet) { return !this.isWeekend(date) && !this.isHoliday(date, holidaySet); },
  getNextNBusinessDays(n, holidaySet, startFrom) {
    const results = [];
    const base = startFrom || new Date();
    let cursor = new Date(base.getFullYear(), base.getMonth(), base.getDate());
    cursor.setDate(cursor.getDate() + 1); // follow-ups are future days, never same-day
    while (results.length < n) {
      if (this.isBusinessDay(cursor, holidaySet)) results.push(new Date(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    return results;
  }
};

/* =========================================================
   SECTION: DATA LAYER (IndexedDB)
   ========================================================= */
function reqToPromise(req) {
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const DB = {
  _db: null,
  open() {
    if (this._db) return Promise.resolve(this._db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('attendees')) {
          const s = db.createObjectStore('attendees', { keyPath: 'id' });
          s.createIndex('searchName', 'searchName', { unique: false });
          s.createIndex('checkInStatus', 'checkInStatus', { unique: false });
        }
        if (!db.objectStoreNames.contains('scheduledCalls')) {
          const s = db.createObjectStore('scheduledCalls', { keyPath: 'id' });
          s.createIndex('attendeeId', 'attendeeId', { unique: false });
        }
        if (!db.objectStoreNames.contains('messageQueue')) {
          const s = db.createObjectStore('messageQueue', { keyPath: 'id' });
          s.createIndex('attendeeId', 'attendeeId', { unique: false });
          s.createIndex('status', 'status', { unique: false });
        }
        if (!db.objectStoreNames.contains('settings')) {
          db.createObjectStore('settings', { keyPath: 'key' });
        }
        if (!db.objectStoreNames.contains('autoTextLog')) {
          const s = db.createObjectStore('autoTextLog', { keyPath: 'id' });
          s.createIndex('status', 'status', { unique: false });
        }
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(this._db); };
      req.onerror = (e) => reject(e.target.error);
    });
  },
  async get(storeName, key) {
    const db = await this.open();
    return reqToPromise(db.transaction(storeName, 'readonly').objectStore(storeName).get(key));
  },
  async getAll(storeName) {
    const db = await this.open();
    return reqToPromise(db.transaction(storeName, 'readonly').objectStore(storeName).getAll());
  },
  async put(storeName, value) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).put(value);
      tx.oncomplete = () => resolve(value);
      tx.onerror = () => reject(tx.error);
    });
  },
  async putMany(storeName, values) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      values.forEach(v => store.put(v));
      tx.oncomplete = () => resolve(values);
      tx.onerror = () => reject(tx.error);
    });
  },
  async writeCheckIn(attendee, messages) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(['attendees', 'messageQueue'], 'readwrite');
      tx.objectStore('attendees').put(attendee);
      messages.forEach(m => tx.objectStore('messageQueue').add(m));
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async writeSchedule(attendee, call, messages) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(['attendees', 'scheduledCalls', 'messageQueue'], 'readwrite');
      tx.objectStore('attendees').put(attendee);
      tx.objectStore('scheduledCalls').put(call);
      messages.forEach(m => tx.objectStore('messageQueue').add(m));
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async getSetting(key) {
    const row = await this.get('settings', key);
    return row ? row.value : undefined;
  },
  async setSetting(key, value) {
    return this.put('settings', { key, value });
  },
  async wipeAttendeeData() {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(['attendees', 'scheduledCalls', 'messageQueue'], 'readwrite');
      tx.objectStore('attendees').clear();
      tx.objectStore('scheduledCalls').clear();
      tx.objectStore('messageQueue').clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async deleteMany(storeName, keys) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      keys.forEach(k => store.delete(k));
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  // Deleting a check-in also removes its scheduled call(s) and queued
  // messages so the admin views never show orphaned records pointing at
  // a deleted attendee.
  async deleteAttendeesCascade(attendeeIds) {
    const db = await this.open();
    const idSet = new Set(attendeeIds);
    const [calls, messages] = [await this.getAll('scheduledCalls'), await this.getAll('messageQueue')];
    const callIds = calls.filter(c => idSet.has(c.attendeeId)).map(c => c.id);
    const messageIds = messages.filter(m => idSet.has(m.attendeeId)).map(m => m.id);
    return new Promise((resolve, reject) => {
      const tx = db.transaction(['attendees', 'scheduledCalls', 'messageQueue'], 'readwrite');
      attendeeIds.forEach(id => tx.objectStore('attendees').delete(id));
      callIds.forEach(id => tx.objectStore('scheduledCalls').delete(id));
      messageIds.forEach(id => tx.objectStore('messageQueue').delete(id));
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
};

   AppData mirrors the attendees store for fast search-as-you-type.

  thankYouInfo: null
};

App.rebuildHolidaySet = function () {
  const now = new Date();
  App.holidaySet = BusinessDays.buildHolidaySet(
    HOLIDAYS_DEFAULT,
    [now.getFullYear(), now.getFullYear() + 1],
    App.holidayOverrides.addedCustom,

/* =========================================================
   SECTION: SEARCH
   ========================================================= */
const Search = {
  run(queryRaw) {
    const query = (queryRaw || '').trim().toLowerCase();
    if (query.length < CONFIG.MIN_SEARCH_CHARS) return [];
    return AppData.attendees.filter(a => a.searchName.indexOf(query) !== -1)
      .slice(0, CONFIG.MAX_SEARCH_RESULTS);
  },
  // Attendees are shown as "First L." only. If two matches collide on that
  // label, append the company as a tiebreaker so a guest can tell which is theirs.
  displayLabels(matches) {
    const counts = {};
    matches.forEach(a => {
      const label = a.firstName + ' ' + (a.lastName ? a.lastName.charAt(0).toUpperCase() + '.' : '');
      counts[label] = (counts[label] || 0) + 1;
    });
    return matches.map(a => {
      const label = a.firstName + ' ' + (a.lastName ? a.lastName.charAt(0).toUpperCase() + '.' : '');
      if (counts[label] > 1 && a.company) return { id: a.id, label: label + ' — ' + a.company };
      return { id: a.id, label: label };
    });
  }
};

/* =========================================================
   SECTION: MESSAGE QUEUE (export-only; nothing is ever sent
   from this app -- staff export and send manually once online)
   ========================================================= */
const MessageQueue = {
  templates: {
    checkin_confirmation: (attendee) =>
      'Hi ' + attendee.firstName + ', thanks for stopping by our seminar today! We have your information on file and look forward to being in touch.',
    call_reminder: (attendee, extra) =>
      'Hi ' + attendee.firstName + ', just a reminder that our team will be calling you on ' + extra.friendlyDate +
      ' during the ' + extra.windowLabel.toLowerCase() + '. Talk soon!'
  },
  buildMessages(attendee, messageType, extra) {
    const now = new Date().toISOString();
    const content = this.templates[messageType](attendee, extra);
    const messages = [];
    const base = {
      attendeeId: attendee.id,
      messageType: messageType,
      recipientName: attendee.firstName + ' ' + attendee.lastName,
      recipientPhone: attendee.phone,
      recipientEmail: attendee.email,
      content: content,
      status: 'pending',
      createdAt: now,
      exportedAt: null
    };
    if (attendee.phone) messages.push(Object.assign({ id: IdUtil.newId('msg'), channel: 'sms' }, base));
    if (attendee.email) messages.push(Object.assign({ id: IdUtil.newId('msg'), channel: 'email' }, base));
    return messages;
  }
};

/* =========================================================
   SECTION: AUTO-TEXT (direct Global Relay send)
   Stores the Global Relay API key in IndexedDB and calls the API
   directly from this device. This is a known, accepted tradeoff:
   the key is retrievable by anyone with brief access to this
   device's browser storage inspector. All sends are wrapped so a
   failure here can never block or interrupt the check-in flow.
   ========================================================= */
const AutoText = {
  _settings: null,
  DEFAULT_CHECKIN_MESSAGE: 'You are checked in to the U.S. Capital Wealth seminar. We look forward to seeing you today.',
  DEFAULT_CALL_MESSAGE: 'You are checked in to the U.S. Capital Wealth seminar.',

  async loadSettings() {
    const [enabled, apiUrl, apiKey, includeCall, messageCheckin, messageCall] = await Promise.all([
      DB.getSetting('autoTextEnabled'),
      DB.getSetting('autoTextApiUrl'),
      DB.getSetting('autoTextApiKey'),
      DB.getSetting('autoTextIncludeCall'),
      DB.getSetting('autoTextMessageCheckin'),
      DB.getSetting('autoTextMessageCall')
    ]);
    this._settings = {
      enabled: !!enabled,
      apiUrl: apiUrl || '',
      apiKey: apiKey || '',
      includeCall: !!includeCall,
      messageCheckin: messageCheckin || '',
      messageCall: messageCall || ''
    };
    return this._settings;
  },

  buildMessage(type, callDetails) {
    const s = this._settings || {};
    if (type === 'call') {
      const base = (s.messageCall || '').trim() || this.DEFAULT_CALL_MESSAGE;
      const callLine = 'Your follow-up call is scheduled for ' + callDetails.friendlyDate +
        ' during the ' + callDetails.windowLabel + ' window.';
      return base + '\n' + callLine;
    }
    return (s.messageCheckin || '').trim() || this.DEFAULT_CHECKIN_MESSAGE;
  },

  async _logEntry(entry) {
    const record = Object.assign({ id: IdUtil.newId('atlog'), timestamp: new Date().toISOString(), failureReason: '' }, entry);
    await DB.put('autoTextLog', record);
    return record;
  },

  async _postToGlobalRelay(settings, phone, message) {
    const res = await fetch(settings.apiUrl, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + settings.apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: phone, message: message })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  },

  // Fire-and-forget by design -- callers never await this in the middle of
  // the attendee-facing flow, and every error path is caught internally.
  async send(attendee, type, callDetails) {
    try {
      const settings = this._settings || await this.loadSettings();
      if (!settings.apiUrl || !settings.apiKey) return;
      if (!attendee || !attendee.phone) return;
      const message = this.buildMessage(type, callDetails);
      const base = {
        attendeeId: attendee.id,
        recipientName: (attendee.firstName || '') + ' ' + (attendee.lastName || ''),
        recipientPhone: attendee.phone,
        messageType: type,
        message: message
      };
      if (!navigator.onLine) {
        await this._logEntry(Object.assign({}, base, { status: 'Pending' }));
        return;
      }
      try {
        await this._postToGlobalRelay(settings, attendee.phone, message);
        await this._logEntry(Object.assign({}, base, { status: 'Sent' }));
      } catch (err) {
        await this._logEntry(Object.assign({}, base, { status: 'Failed', failureReason: err.message || 'Network error' }));
      }
    } catch (outerErr) {
      // never let an auto-text failure interrupt the check-in flow
    }
  },

  async sendTest(phone) {
    try {
      const settings = this._settings || await this.loadSettings();
      if (!settings.apiUrl || !settings.apiKey) return { ok: false, message: 'Save API URL and key first.' };
      const message = this.buildMessage('checkin');
      const base = { attendeeId: null, recipientName: 'Test Send', recipientPhone: phone, messageType: 'test', message: message };
      if (!navigator.onLine) {
        await this._logEntry(Object.assign({}, base, { status: 'Pending' }));
        return { ok: false, message: 'No internet connection. Queued as pending.' };
      }
      try {
        await this._postToGlobalRelay(settings, phone, message);
        await this._logEntry(Object.assign({}, base, { status: 'Sent' }));
        return { ok: true, message: 'Test text sent.' };
      } catch (err) {
        await this._logEntry(Object.assign({}, base, { status: 'Failed', failureReason: err.message || 'Network error' }));
        return { ok: false, message: 'Failed to send: ' + (err.message || 'Network error') };
      }
    } catch (outerErr) {
      return { ok: false, message: 'Unexpected error.' };
    }
  },

  async _retryEntry(entry) {
    const settings = this._settings || await this.loadSettings();
    if (!settings.apiUrl || !settings.apiKey) return;
    if (!entry.recipientPhone || !entry.message) return;
    try {
      await this._postToGlobalRelay(settings, entry.recipientPhone, entry.message);
      await DB.put('autoTextLog', Object.assign({}, entry, { status: 'Sent', timestamp: new Date().toISOString(), failureReason: '' }));
    } catch (err) {
      await DB.put('autoTextLog', Object.assign({}, entry, { status: 'Failed', timestamp: new Date().toISOString(), failureReason: err.message || 'Network error' }));
    }
  },

  async drainQueue() {
    try {
      const settings = this._settings || await this.loadSettings();
      if (!settings.apiUrl || !settings.apiKey) return;
      if (!navigator.onLine) return;
      const log = await DB.getAll('autoTextLog');
      const toRetry = log.filter(l => l.status === 'Pending' || l.status === 'Failed');
      for (const entry of toRetry) {
        await this._retryEntry(entry);
      }
    } catch (err) {
      // best-effort background drain -- never throw
    }
  },

  async retryAllFailed() {
    const log = await DB.getAll('autoTextLog');
    const failed = log.filter(l => l.status === 'Failed');
    for (const entry of failed) {
      await this._retryEntry(entry);
    }
  }
};

/* =========================================================
   SECTION: CHECK-IN FLOW
   ========================================================= */
const CheckIn = {
  openExisting(attendeeId) {
    AppState.currentAttendeeId = attendeeId;
    AppState.isNewGuest = false;
    UI.showScreen('screen-attendee-confirm');
  },
  openNew() {
    AppState.currentAttendeeId = null;
    AppState.isNewGuest = true;
    UI.showScreen('screen-attendee-confirm');
  },
  async submitForm(values) {
    const now = new Date().toISOString();
    let attendee;
    if (AppState.isNewGuest) {
      attendee = {
        id: IdUtil.newId('att'),
        firstName: values.firstName.trim(),
        lastName: values.lastName.trim(),
        phone: values.phone.trim(),
        email: values.email.trim(),
        company: values.company.trim(),
        retirementDate: values.retirementDate.trim(),
        checkInStatus: 'checked_in',
        checkInTimestamp: now,
        source: 'walk_in',
        isWalkIn: true,
        assignedTeamMember: '',
        scheduledCallId: null,
        updatedAt: now
      };
    } else {
      attendee = AppData.attendees.find(a => a.id === AppState.currentAttendeeId);
      Object.assign(attendee, {
        firstName: values.firstName.trim(),
        lastName: values.lastName.trim(),
        phone: values.phone.trim(),
        email: values.email.trim(),
        company: values.company.trim(),
        retirementDate: values.retirementDate.trim(),
        checkInStatus: 'checked_in',
        checkInTimestamp: now,
        updatedAt: now
      });
    }
    attendee.searchName = (attendee.firstName + ' ' + attendee.lastName).toLowerCase();
    const messages = MessageQueue.buildMessages(attendee, 'checkin_confirmation');
    await DB.writeCheckIn(attendee, messages);
    const idx = AppData.attendees.findIndex(a => a.id === attendee.id);
    if (idx >= 0) AppData.attendees[idx] = attendee; else AppData.attendees.push(attendee);
    AppState.currentAttendeeId = attendee.id;
    AppState.isNewGuest = false;
    if (AutoText._settings && AutoText._settings.enabled && attendee.phone) {
      AutoText.send(attendee, 'checkin');
    }
    UI.showScreen('screen-schedule-offer');
  }
};

/* =========================================================
   SECTION: SCHEDULING FLOW
   ========================================================= */
const Scheduler = {
  async decline() {
    const attendee = AppData.attendees.find(a => a.id === AppState.currentAttendeeId);
    const call = {
      id: IdUtil.newId('call'), attendeeId: attendee.id, date: null, window: null,
      status: 'declined', assignedTeamMember: '', createdAt: new Date().toISOString()
    };
    await DB.put('scheduledCalls', call);
    AppState.thankYouInfo = { declined: true };
    UI.showScreen('screen-thank-you');
  },
  goToDayPicker() { UI.showScreen('screen-day-picker'); },
  selectDay(dateObj) {
    AppState.pendingDate = BusinessDays.formatISODate(dateObj);
    AppState.pendingDateFriendly = BusinessDays.formatFriendlyDate(dateObj);
    UI.showScreen('screen-window-picker');
  },
  async confirmWindow(windowKey) {
    const attendee = AppData.attendees.find(a => a.id === AppState.currentAttendeeId);
    const call = {
      id: IdUtil.newId('call'), attendeeId: attendee.id, date: AppState.pendingDate, window: windowKey,
      status: 'scheduled', assignedTeamMember: '', createdAt: new Date().toISOString()
    };
    attendee.scheduledCallId = call.id;
    attendee.updatedAt = new Date().toISOString();
    const messages = MessageQueue.buildMessages(attendee, 'call_reminder', {
      friendlyDate: AppState.pendingDateFriendly, windowLabel: WINDOW_LABELS[windowKey]
    });
    await DB.writeSchedule(attendee, call, messages);
    if (AutoText._settings && AutoText._settings.enabled && AutoText._settings.includeCall && attendee.phone) {
      AutoText.send(attendee, 'call', { friendlyDate: AppState.pendingDateFriendly, windowLabel: WINDOW_LABELS[windowKey] });
    }
    AppState.thankYouInfo = { declined: false, friendlyDate: AppState.pendingDateFriendly, windowLabel: WINDOW_LABELS[windowKey] };
    UI.showScreen('screen-thank-you');
  }
};

/* =========================================================
   SECTION: IMPORT (CSV paste + JSON file)
   ========================================================= */
const Importer = {
  splitCSVLine(line) {
    const cells = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"') {
          if (line[i + 1] === '"') { cur += '"'; i++; } else { inQuotes = false; }
        } else cur += ch;
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',') { cells.push(cur); cur = ''; }
        else cur += ch;
      }
    }
    cells.push(cur);
    return cells;
  },
  parseCSV(text) {
    const lines = text.split(/\r\n|\n|\r/).filter(l => l.trim().length > 0);
    if (lines.length === 0) return [];
    const header = this.splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
    const records = [];
    for (let i = 1; i < lines.length; i++) {
      const cells = this.splitCSVLine(lines[i]);
      const rec = {};
      header.forEach((h, idx) => { rec[h] = (cells[idx] || '').trim(); });
      records.push(rec);
    }
    return records;
  },
  async importAttendees(records) {
    const now = new Date().toISOString();
    const existingNames = new Set(AppData.attendees.map(a => a.searchName));
    const toInsert = [];
    let skippedInvalid = 0, skippedDuplicate = 0;
    const errors = [];
    records.forEach((rec, i) => {
      const firstName = (rec.firstname || rec.firstName || '').trim();
      const lastName = (rec.lastname || rec.lastName || '').trim();
      if (!firstName || !lastName) { skippedInvalid++; errors.push('Row ' + (i + 2) + ': missing first or last name'); return; }
      const searchName = (firstName + ' ' + lastName).toLowerCase();
      if (existingNames.has(searchName)) { skippedDuplicate++; return; }
      existingNames.add(searchName);
      toInsert.push({
        id: IdUtil.newId('att'),
        firstName, lastName, searchName,
        phone: (rec.phone || '').trim(),
        email: (rec.email || '').trim(),
        company: (rec.company || '').trim(),
        retirementDate: (rec.retirementdate || rec.retirementDate || '').trim(),
        checkInStatus: 'not_checked_in',
        checkInTimestamp: null,
        source: 'imported',
        assignedTeamMember: '',
        scheduledCallId: null,
        updatedAt: now
      });
    });
    if (toInsert.length > 0) {
      await DB.putMany('attendees', toInsert);
      AppData.attendees = AppData.attendees.concat(toInsert);
    }
    return { imported: toInsert.length, skippedDuplicate, skippedInvalid, errors };
  }
};

/* =========================================================
   SECTION: ADMIN
   Note: this password gate is a casual client-side deterrent
   only (confirmed acceptable) -- it is not real security, since
   anyone with the HTML file can read the source.
   ========================================================= */
const Admin = {
  async checkPassword(pw) {
    const hash = await sha256Hex(pw);
    const stored = await DB.getSetting('adminPasswordHash');
    return hash === stored;
  },
  async setPassword(pw) {
    const hash = await sha256Hex(pw);
    await DB.setSetting('adminPasswordHash', hash);
  },
  async addTeamMember(name) {
    name = name.trim();
    if (!name || AppData.teamMembers.indexOf(name) !== -1) return;
    AppData.teamMembers.push(name);
    await DB.setSetting('teamMembers', AppData.teamMembers);
  },
  async removeTeamMember(name) {
    AppData.teamMembers = AppData.teamMembers.filter(t => t !== name);
    await DB.setSetting('teamMembers', AppData.teamMembers);
  }
};

/* =========================================================
   SECTION: IDLE TIMER / KIOSK RESET
   Fires the reset without touching IndexedDB -- only clears
   on-screen/in-memory working state, never the durable data.
   ========================================================= */
const IdleTimer = {
  timer: null,
  context: 'public',
  lastActivity: Date.now(),
  init() {
    ['touchstart', 'mousedown', 'keydown', 'input', 'click'].forEach(evt =>
      document.addEventListener(evt, () => this.reset(), { passive: true }));
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        const elapsed = Date.now() - this.lastActivity;
        if (elapsed >= this._limit()) this.fire(); else this.reset();
      }
    });
    this.reset();
  },
  _limit() { return this.context === 'admin' ? CONFIG.ADMIN_IDLE_TIMEOUT_MS : CONFIG.IDLE_TIMEOUT_MS; },
  setContext(ctx) { this.context = ctx; },
  reset() {
    this.lastActivity = Date.now();
    if (this.timer) clearTimeout(this.timer);
    this.timer = setTimeout(() => this.fire(), this._limit());
  },
  fire() {
    UI.clearScreenContent(UI.currentScreen);
    AppState.currentAttendeeId = null;
    AppState.isNewGuest = false;
    AppState.pendingDate = null;
    AppState.thankYouInfo = null;
    UI.forceShowHome();
  }
};

    select.appendChild(el('option', { value: '', text: '—' }));
    AppData.teamMembers.forEach(name => {
      const opt = el('option', { value: name, text: name });
      if (name === current) opt.selected = true;
      select.appendChild(opt);
    });
    return select;
  },

  _renderImportPanel(panel, checkInsPanel) {
    const reportResult = async (result) => {
      summaryBox.textContent = 'Imported ' + result.imported + ', skipped ' + result.skippedDuplicate +
        ' duplicates, ' + result.skippedInvalid + ' invalid rows.' + (result.errors.length ? ' ' + result.errors.join('; ') : '');
      if (checkInsPanel) await UI._renderCheckInsPanel(checkInsPanel);
    };

    panel.appendChild(el('h2', { text: 'Import Guest List (do this before the seminar, while online)' }));
    panel.appendChild(el('label', { text: 'Load a CSV file (header row required: firstName,lastName,phone,email,company,retirementDate)' }));
    const summaryBox = el('div', { class: 'summary-box' });
    const csvFileInput = el('input', { type: 'file', accept: '.csv,text/csv' });
    csvFileInput.addEventListener('change', () => {
      const file = csvFileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        const records = Importer.parseCSV(reader.result);
        const result = await Importer.importAttendees(records);
        await reportResult(result);
      };
      reader.readAsText(file);
    });
    panel.appendChild(csvFileInput);

    panel.appendChild(el('label', { text: 'Or paste CSV text directly' }));
    const textarea = el('textarea', { rows: 8 });
    panel.appendChild(textarea);
    panel.appendChild(el('button', {
      class: 'btn btn-accent', text: 'Import Pasted CSV', onclick: async () => {
        const records = Importer.parseCSV(textarea.value);
        const result = await Importer.importAttendees(records);
        await reportResult(result);
      }
    }));
    panel.appendChild(el('label', { text: 'Or load a JSON file (array of records, or {"attendees": [...]})' }));
    const fileInput = el('input', { type: 'file', accept: 'application/json' });
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const parsed = JSON.parse(reader.result);
          const records = Array.isArray(parsed) ? parsed : (parsed.attendees || []);
          const mapped = records.map(r => ({
            firstname: r.firstName || r.firstname, lastname: r.lastName || r.lastname,
            phone: r.phone, email: r.email, company: r.company,
            retirementdate: r.retirementDate || r.retirementdate
          }));
          const result = await Importer.importAttendees(mapped);
          await reportResult(result);
        } catch (err) {
          summaryBox.textContent = 'Could not read JSON file: ' + err.message;
        }
      };
      reader.readAsText(file);
    });
    panel.appendChild(fileInput);
    panel.appendChild(summaryBox);
  },

  _renderExportPanel(panel) {
    panel.appendChild(el('h2', { text: 'Export (once back online, send these via Global Relay / email manually)' }));
    panel.appendChild(el('button', { class: 'btn btn-small', text: 'Export Attendees CSV', onclick: () => Exporter.exportAttendeesCSV() }));
    panel.appendChild(el('button', { class: 'btn btn-small', text: 'Export Scheduled Calls CSV', onclick: () => Exporter.exportScheduledCallsCSV() }));
    const includeExportedCheckbox = el('input', { type: 'checkbox', id: 'include-exported' });
    const checkboxRow = el('div', { class: 'checkbox-row' }, [includeExportedCheckbox, el('label', { text: 'Include already-exported messages' })]);
    panel.appendChild(checkboxRow);
    panel.appendChild(el('button', {
      class: 'btn btn-small', text: 'Export Message Queue CSV',
      onclick: () => Exporter.exportMessageQueueCSV(includeExportedCheckbox.checked)
    }));
    panel.appendChild(el('button', { class: 'btn btn-small', text: 'Printable Summary', onclick: () => Exporter.renderPrintSummaryAndPrint() }));
  },

  _renderHolidaysPanel(panel) {
    panel.appendChild(el('h2', { text: 'Holiday List (affects the next-3-business-days scheduling offer)' }));
    const now = new Date();
    const named = BusinessDays.resolveNamedDatesForYears(HOLIDAYS_DEFAULT, [now.getFullYear(), now.getFullYear() + 1])
      .sort((a, b) => a.date.localeCompare(b.date));
    named.forEach(h => {
      const checkbox = el('input', { type: 'checkbox' });
      checkbox.checked = App.holidayOverrides.removedDefaults.indexOf(h.date) === -1;
      checkbox.addEventListener('change', async () => {
        const list = App.holidayOverrides.removedDefaults;
        const i = list.indexOf(h.date);
        if (checkbox.checked && i !== -1) list.splice(i, 1);
        if (!checkbox.checked && i === -1) list.push(h.date);
        await DB.setSetting('holidayOverrides', App.holidayOverrides);
        App.rebuildHolidaySet();
      });
      panel.appendChild(el('div', { class: 'checkbox-row' }, [checkbox, el('label', { text: 'Skip ' + h.name + ' (' + h.date + ')' })]));
    });
    panel.appendChild(el('h2', { text: 'Add a custom date to skip' }));
    const dateInput = el('input', { type: 'date' });
    panel.appendChild(dateInput);
    const customList = el('div');
    const renderCustomList = () => {
      customList.innerHTML = '';
      App.holidayOverrides.addedCustom.forEach(d => {
        customList.appendChild(el('div', { class: 'checkbox-row' }, [
          el('span', { text: d }),
          el('button', {
            class: 'btn btn-small btn-secondary', text: 'Remove', onclick: async () => {
              App.holidayOverrides.addedCustom = App.holidayOverrides.addedCustom.filter(x => x !== d);
              await DB.setSetting('holidayOverrides', App.holidayOverrides);
              App.rebuildHolidaySet();
              renderCustomList();
            }
          })
        ]));
      });
    };
    renderCustomList();
    panel.appendChild(el('button', {
      class: 'btn btn-small', text: 'Add', onclick: async () => {
        if (!dateInput.value) return;
        if (App.holidayOverrides.addedCustom.indexOf(dateInput.value) === -1) App.holidayOverrides.addedCustom.push(dateInput.value);
        await DB.setSetting('holidayOverrides', App.holidayOverrides);
        App.rebuildHolidaySet();
        renderCustomList();
        dateInput.value = '';
      }
    }));
    panel.appendChild(customList);
  },

  async _renderStatsBar(container) {
    const [attendees, calls] = [await DB.getAll('attendees'), await DB.getAll('scheduledCalls')];
    const totalCheckedIn = attendees.filter(a => a.checkInStatus === 'checked_in').length;
    const totalScheduled = calls.filter(c => c.status === 'scheduled').length;
    const totalWalkIns = attendees.filter(a => a.isWalkIn === true).length;
    const statsBar = el('div', { class: 'btn-row' });
    [
      ['Total Checked In', totalCheckedIn],
      ['Total Scheduled Calls', totalScheduled],
      ['Total Walk-Ins', totalWalkIns]
    ].forEach(([label, count]) => {
      const box = el('div', { class: 'summary-box', style: 'flex:1;text-align:center;' });
      box.appendChild(el('div', { text: String(count), style: 'font-size:32px;font-weight:700;color:var(--uscw-navy);' }));
      box.appendChild(el('div', { text: label }));
      statsBar.appendChild(box);
    });
    container.appendChild(statsBar);
  },

  async _renderAutoTextPanel(panel) {
    panel.innerHTML = '';
    await AutoText.loadSettings();
    const s = AutoText._settings;

    panel.appendChild(el('span', { class: 'eyebrow', text: 'Credentials' }));

    const urlField = el('div', { class: 'field' });
    urlField.appendChild(el('label', { text: 'Global Relay REST API URL' }));
    const urlInput = el('input', { type: 'text' });
    urlInput.value = s.apiUrl;
    urlField.appendChild(urlInput);
    panel.appendChild(urlField);

    const keyField = el('div', { class: 'field' });
    keyField.appendChild(el('label', { text: 'Global Relay API Key' }));
    const keyInput = el('input', { type: 'password' });
    keyInput.value = s.apiKey;
    keyField.appendChild(keyInput);
    const toggleKeyBtn = el('button', {
      class: 'btn btn-secondary btn-small', text: 'Show', onclick: () => {
        if (keyInput.type === 'password') { keyInput.type = 'text'; toggleKeyBtn.textContent = 'Hide'; }
        else { keyInput.type = 'password'; toggleKeyBtn.textContent = 'Show'; }
      }
    });
    keyField.appendChild(toggleKeyBtn);
    panel.appendChild(keyField);

    const credStatus = el('div', { class: 'summary-box' });
    credStatus.style.display = 'none';
    panel.appendChild(el('button', {
      class: 'btn btn-accent btn-small', text: 'Save Credentials', onclick: async () => {
        await DB.setSetting('autoTextApiUrl', urlInput.value.trim());
        await DB.setSetting('autoTextApiKey', keyInput.value.trim());
        await AutoText.loadSettings();
        credStatus.style.display = 'block';
        credStatus.textContent = 'Credentials saved.';
      }
    }));
    panel.appendChild(credStatus);

    panel.appendChild(el('span', { class: 'eyebrow', text: 'Options' }));

    const enableCheckbox = el('input', { type: 'checkbox' });
    enableCheckbox.checked = s.enabled;
    enableCheckbox.addEventListener('change', async () => {
      await DB.setSetting('autoTextEnabled', enableCheckbox.checked);
      AutoText._settings.enabled = enableCheckbox.checked;
    });
    panel.appendChild(el('div', { class: 'checkbox-row' }, [enableCheckbox, el('label', { text: 'Enable Auto-Text' })]));

    const includeCallCheckbox = el('input', { type: 'checkbox' });
    includeCallCheckbox.checked = s.includeCall;
    includeCallCheckbox.addEventListener('change', async () => {
      await DB.setSetting('autoTextIncludeCall', includeCallCheckbox.checked);
      AutoText._settings.includeCall = includeCallCheckbox.checked;
    });
    panel.appendChild(el('div', { class: 'checkbox-row' }, [includeCallCheckbox, el('label', { text: 'Include scheduled call date and time in confirmation text' })]));

    panel.appendChild(el('span', { class: 'eyebrow', text: 'Message Templates' }));

    panel.appendChild(el('label', { text: 'Check-in confirmation message' }));
    const checkinTextarea = el('textarea', { rows: 4 });
    checkinTextarea.value = s.messageCheckin;
    panel.appendChild(checkinTextarea);
    panel.appendChild(el('button', {
      class: 'btn btn-secondary btn-small', text: 'Save Message', onclick: async () => {
        await DB.setSetting('autoTextMessageCheckin', checkinTextarea.value.trim());
        AutoText._settings.messageCheckin = checkinTextarea.value.trim();
      }
    }));
    panel.appendChild(el('label', { text: 'Preview' }));
    const checkinPreview = el('div', { class: 'summary-box' });
    const renderCheckinPreview = () => {
      checkinPreview.textContent = checkinTextarea.value.trim() || AutoText.DEFAULT_CHECKIN_MESSAGE;
    };
    checkinTextarea.addEventListener('input', renderCheckinPreview);
    panel.appendChild(checkinPreview);
    renderCheckinPreview();

    panel.appendChild(el('label', { text: 'Check-in with call message' }));
    const callTextarea = el('textarea', { rows: 4 });
    callTextarea.value = s.messageCall;
    panel.appendChild(callTextarea);
    panel.appendChild(el('button', {
      class: 'btn btn-secondary btn-small', text: 'Save Message', onclick: async () => {
        await DB.setSetting('autoTextMessageCall', callTextarea.value.trim());
        AutoText._settings.messageCall = callTextarea.value.trim();
      }
    }));
    panel.appendChild(el('label', { text: 'Preview' }));
    const callPreview = el('div', { class: 'summary-box' });
    const sampleCallDate = BusinessDays.formatFriendlyDate(new Date(2026, 0, 12));
    const renderCallPreview = () => {
      const base = callTextarea.value.trim() || AutoText.DEFAULT_CALL_MESSAGE;
      const callLine = 'Your follow-up call is scheduled for ' + sampleCallDate + ' during the Morning window.';
      callPreview.textContent = base + '\n' + callLine;
    };
    callTextarea.addEventListener('input', renderCallPreview);
    panel.appendChild(callPreview);
    renderCallPreview();

    panel.appendChild(el('span', { class: 'eyebrow', text: 'Send Test' }));
    const testField = el('div', { class: 'field' });
    testField.appendChild(el('label', { text: 'Phone number' }));
    const testPhoneInput = el('input', { type: 'tel' });
    testField.appendChild(testPhoneInput);
    panel.appendChild(testField);
    const testStatus = el('div', { class: 'summary-box' });
    testStatus.style.display = 'none';
    panel.appendChild(el('button', {
      class: 'btn btn-accent btn-small', text: 'Send Test', onclick: async () => {
        const phone = testPhoneInput.value.trim();
        if (!phone) { testStatus.style.display = 'block'; testStatus.textContent = 'Enter a phone number first.'; return; }
        const result = await AutoText.sendTest(phone);
        testStatus.style.display = 'block';
        testStatus.textContent = result.message;
        await renderLog();
      }
    }));
    panel.appendChild(testStatus);

    panel.appendChild(el('span', { class: 'eyebrow', text: 'Send Log' }));
    panel.appendChild(el('button', {
      class: 'btn btn-secondary btn-small', text: 'Retry All Failed', onclick: async () => {
        await AutoText.retryAllFailed();
        await renderLog();
      }
    }));
    const logContainer = el('div');
    panel.appendChild(logContainer);

    const renderLog = async () => {
      logContainer.innerHTML = '';
      const log = await DB.getAll('autoTextLog');
      log.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
      const recent = log.slice(0, 20);
      const table = el('table');
      table.appendChild(el('tr', {}, ['Recipient', 'Status', 'Timestamp', 'Failure Reason'].map(h => el('th', { text: h }))));
      recent.forEach(entry => {
        table.appendChild(el('tr', {}, [
          el('td', { text: entry.recipientName || '' }),
          el('td', { text: entry.status }),
          el('td', { text: new Date(entry.timestamp).toLocaleString() }),
          el('td', { text: entry.failureReason || '' })
        ]));
      });
      logContainer.appendChild(table);
    };
    await renderLog();
  },

  _renderSettingsPanel(panel) {
    panel.appendChild(el('h2', { text: 'Team Members' }));
    const teamList = el('div');
    const renderTeamList = () => {
      teamList.innerHTML = '';
      AppData.teamMembers.forEach(name => {
        teamList.appendChild(el('div', { class: 'checkbox-row' }, [
          el('span', { text: name }),
          el('button', {
            class: 'btn btn-small btn-secondary', text: 'Remove', onclick: async () => {
              await Admin.removeTeamMember(name);
              renderTeamList();
            }
          })
        ]));
      });
    };
    renderTeamList();
    panel.appendChild(teamList);
    const nameInput = el('input', { type: 'text', placeholder: 'Team member name' });
    panel.appendChild(nameInput);
    panel.appendChild(el('button', {
      class: 'btn btn-small', text: 'Add Team Member', onclick: async () => {
        await Admin.addTeamMember(nameInput.value);
        nameInput.value = '';
        renderTeamList();
      }
    }));

    panel.appendChild(el('h2', { text: 'Change Admin Password' }));
    const pwInput = el('input', { type: 'password', placeholder: 'New password' });
    const pwStatus = el('div', { class: 'summary-box' });
    panel.appendChild(pwInput);
    panel.appendChild(el('button', {
      class: 'btn btn-small', text: 'Update Password', onclick: async () => {
        if (!pwInput.value.trim()) return;
        await Admin.setPassword(pwInput.value.trim());
        pwInput.value = '';
        pwStatus.textContent = 'Password updated.';
      }
    }));
    panel.appendChild(pwStatus);

    panel.appendChild(el('h2', { text: 'Danger Zone' }));
    const confirmInput = el('input', { type: 'text', placeholder: 'Type DELETE to confirm' });
    const wipeStatus = el('div', { class: 'summary-box' });
    panel.appendChild(el('p', { class: 'body-text', text: 'Clears all attendee, check-in, scheduled call, and message queue data. Settings (password, team members, holidays) are kept.' }));
    panel.appendChild(confirmInput);
    panel.appendChild(el('button', {
      class: 'btn btn-danger', text: 'Wipe All Attendee Data', onclick: async () => {
        if (confirmInput.value.trim() !== 'DELETE') { wipeStatus.textContent = 'Type DELETE exactly to confirm.'; return; }
        await DB.wipeAttendeeData();
        AppData.attendees = [];
        confirmInput.value = '';
        wipeStatus.textContent = 'All attendee data has been wiped.';
      }
    }));
    panel.appendChild(wipeStatus);
  }
};

/* =========================================================
   SECTION: ADMIN ACCESS
   ========================================================= */
document.getElementById('staff-access-btn').addEventListener('click', () => {
  UI.showScreen('screen-admin-gate');
});

/* =========================================================
   SECTION: BOOTSTRAP
   ========================================================= */
async function init() {
  document.getElementById('btn-new-guest').addEventListener('click', () => CheckIn.openNew());
  document.getElementById('btn-exit-admin').addEventListener('click', () => UI.forceShowHome());
  document.getElementById('search-input').addEventListener('input', debounce((e) => {
    const query = e.target.value;
    const hintEl = document.getElementById('search-hint');
    const resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = '';
    if (query.trim().length < CONFIG.MIN_SEARCH_CHARS) {
      hintEl.textContent = query.trim().length > 0 ? 'Keep typing your first or last name…' : '';
      return;
    }
    hintEl.textContent = '';
    const matches = Search.run(query);
    if (matches.length === 0) {
      hintEl.textContent = 'No matches found. Use the button below to check in as a new guest.';
      return;
    }
    Search.displayLabels(matches).forEach(m => {
      resultsEl.appendChild(el('div', { class: 'result-row', text: m.label, onclick: () => CheckIn.openExisting(m.id) }));
    });
  }, 150));

  AppData.attendees = await DB.getAll('attendees');
  AppData.teamMembers = (await DB.getSetting('teamMembers')) || [];

  const existingHash = await DB.getSetting('adminPasswordHash');
  if (!existingHash) await Admin.setPassword(CONFIG.DEFAULT_ADMIN_PASSWORD);

  App.holidayOverrides = (await DB.getSetting('holidayOverrides')) || { addedCustom: [], removedDefaults: [] };
  App.rebuildHolidaySet();

  await AutoText.loadSettings();
  AutoText.drainQueue();
  window.addEventListener('online', () => AutoText.drainQueue());

  IdleTimer.init();
  UI.forceShowHome();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();



})();
</script>
